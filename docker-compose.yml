services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akcie
      POSTGRES_PASSWORD: akcie
      POSTGRES_DB: akcie
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akcie -d akcie"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_DIR=/app/dist
      - DATABASE_URL=postgresql://akcie:akcie@postgres:5432/akcie
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
